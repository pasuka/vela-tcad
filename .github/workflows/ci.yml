name: CI

on:
  push:
  pull_request:

jobs:
  build-and-test:
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install C++ build dependencies
        run: |
          sudo apt-get update
          sudo DEBIAN_FRONTEND=noninteractive apt-get install -y \
            build-essential \
            cmake \
            ninja-build \
            libeigen3-dev \
            nlohmann-json3-dev \
            catch2 \
            python3-pil

      - name: Configure debug build
        run: cmake -S . -B build -G Ninja -DCMAKE_BUILD_TYPE=Debug

      - name: Enforce ASCII source policy
        run: ctest --test-dir build --output-on-failure -R '^ascii_sources$'

      - name: Build
        run: cmake --build build --parallel

      - name: Run test suite
        run: ctest --test-dir build --output-on-failure
